<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="个人博客首页">
  <title>我的博客</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">我的博客</a>
    <nav>
      <a href="/">首页</a>
      <a href="/archive.html">归档</a>
    </nav>
  </header>
  <main class="container">
    <section class="hero">
  <p class="eyebrow">Personal Blog</p>
  <h1>我的博客</h1>
  <p>记录技术、生活和持续迭代的想法。</p>
</section>
<section class="post-list">
  <article class="post-card">
  <time datetime="2026-07-03">2026-07-03</time>
  <h2><a href="/posts/hello.html">第一篇博客</a></h2>
  <p>这个博客已经可以在服务器上构建和部署。</p>
</article>
</section>
  </main>
  <footer class="site-footer">Built as a static blog.</footer>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        const hasIdentityToken = /(?:invite_token|confirmation_token|recovery_token|email_change_token)=/.test(window.location.hash);
        if (!user && hasIdentityToken) {
          window.netlifyIdentity.open();
        }
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      });
    }
  </script>
</body>
</html>
